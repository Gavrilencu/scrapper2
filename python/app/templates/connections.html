{% extends "base.html" %}
{% block title %}Conexiuni - Scrapper Pro{% endblock %}
{% block content %}
<div class="flex" style="justify-content:space-between;align-items:flex-start;margin-bottom:2rem;">
  <div>
    <h1 class="text-white mb-2" style="font-size:1.875rem;font-weight:700;">Conexiuni baze de date</h1>
    <p class="text-muted">Configurează conexiuni Oracle (și altele) pentru job-uri.</p>
  </div>
  <a href="/connections/new" class="btn btn-primary">+ Adaugă conexiune</a>
</div>

<div class="card">
  <div id="content">
    <p class="text-muted" style="text-align:center;padding:3rem;">Se încarcă...</p>
  </div>
</div>

<script>
(async () => {
  const list = await fetch('/api/connections').then(r => r.json());
  const el = document.getElementById('content');
  if (!list.length) {
    el.innerHTML = '<p class="text-muted" style="text-align:center;padding:3rem;">Nicio conexiune. Adaugă una pentru a o asocia job-urilor.</p>';
    return;
  }
  let html = '<div style="overflow-x:auto;"><table class="w-full"><thead><tr><th>Nume</th><th>Tip</th><th>Host / Service</th><th>User</th><th style="width:12rem;">Acțiuni</th></tr></thead><tbody>';
  for (const c of list) {
    html += `<tr>
      <td class="text-white font-medium">${escapeHtml(c.name)}</td>
      <td class="text-muted">${escapeHtml(c.type)}</td>
      <td class="text-muted">${escapeHtml(c.host)}:${c.port} / ${escapeHtml(c.service_name || '')}</td>
      <td class="text-muted">${escapeHtml(c.user_name)}</td>
      <td>
        <button type="button" data-test-id="${c.id}" class="btn btn-secondary gap-2" style="padding:0.5rem;">Test</button>
        <a href="/connections/${c.id}" class="btn btn-secondary" style="padding:0.5rem;">Editează</a>
        <button type="button" data-delete-id="${c.id}" class="btn btn-secondary" style="padding:0.5rem;color:#f87171;">Șterge</button>
      </td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  el.innerHTML = html;

  document.querySelectorAll('[data-test-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.getAttribute('data-test-id');
      btn.disabled = true;
      const r = await fetch(`/api/connections/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'test' }) });
      const data = await r.json();
      btn.disabled = false;
      alert(data.success ? 'Conexiune reușită.' : (data.error || 'Eroare'));
    });
  });
  document.querySelectorAll('[data-delete-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Ștergi această conexiune?')) return;
      const id = btn.getAttribute('data-delete-id');
      await fetch(`/api/connections/${id}`, { method: 'DELETE' });
      location.reload();
    });
  });
})();
function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
{% endblock %}
