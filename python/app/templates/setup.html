<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurare inițială - Scrapper Pro</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div class="card" style="width:100%;max-width:24rem;">
    <h1 class="text-white mb-2" style="font-size:1.5rem;font-weight:700;">Configurare inițială</h1>
    <p class="text-muted mb-6" style="font-size:0.875rem;">Aplicația rulează prima dată. Creează contul de administrator.</p>
    <form method="post" id="setupForm" class="space-y-4">
      <div id="error" class="error-box" style="display:none;"></div>
      <div>
        <label class="label">Utilizator</label>
        <input name="username" class="input" type="text" placeholder="admin" required autocomplete="username">
      </div>
      <div>
        <label class="label">Parolă</label>
        <input name="password" class="input" type="password" placeholder="min. 6 caractere" required autocomplete="new-password">
      </div>
      <div>
        <label class="label">Confirmă parola</label>
        <input name="confirmPassword" class="input" type="password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;" id="btn">Configurează și intră</button>
    </form>
  </div>
  <script>
    (async () => {
      const status = await fetch('/api/auth/needs-setup').then(r => r.json());
      if (!status.needsSetup) window.location.href = '/';
    })();
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      const pw = form.password.value;
      if (pw !== form.confirmPassword.value) {
        errEl.textContent = 'Parolele nu coincid.';
        errEl.style.display = 'block';
        return;
      }
      if (pw.length < 6) {
        errEl.textContent = 'Parola trebuie să aibă minim 6 caractere.';
        errEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Se configurează...';
      const r = await fetch('/api/auth/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: form.username.value.trim(), password: pw }),
        credentials: 'include',
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok) {
        window.location.href = '/';
        return;
      }
      errEl.textContent = data.detail || data.error || 'Eroare';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Configurează și intră';
    });
  </script>
</body>
</html>
